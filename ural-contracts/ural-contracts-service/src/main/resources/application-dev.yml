server:
  port: 10906

spring:
  application:
    name: ural-contracts
    version: @project.version@
  datasource:
    url: jdbc:postgresql://localhost:10900/ural
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        generate_statistics: false
        show_sql: true
        check_nullability: true
        hbm2ddl:
          auto: validate
        default_schema: ural_contracts

  liquibase:
    enabled: true
    liquibase-schema: public
    database-change-log-table: ural_contracts_log
    database-change-log-lock-table: ural_contracts_lock
    change-log: classpath:db/changelog-master.xml
    default-schema: ural_contracts

  kafka:
    bootstrap-servers: localhost:11009

contract-integrations:
  cars-url: http://localhost:10904/api/cars
  cargo-url: http://localhost:10905/api/cargo

graphhopper:
  base-url: ${GRAPHHOPPER_BASE_URL:https://graphhopper.com/api/1}
  api-key: ${GRAPHHOPPER_API_KEY:}
  profile: ${GRAPHHOPPER_PROFILE:car}
  locale: ${GRAPHHOPPER_LOCALE:ru}

kafka:
  notification-contract-topic:
    name: ural-contract-topic
    partitions: 1
  user-rating-topic:
    name: ural-user-rating-topic
    partitions: 1

logging:
  level:
    root: info
    org:
      springframework: INFO
      hibernate: INFO
      apache:
        tomcat:
          util: WARN
