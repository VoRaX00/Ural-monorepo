server:
  port: ${SERVER_PORT}

spring:
  application:
    name: ural-cargo
    version: @project.version@
  datasource:
    url: ${DB_URL}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        generate_statistics: false
        show_sql: ${SHOW_SQL}
        check_nullability: true
        hbm2ddl:
          auto: validate

  liquibase:
    enabled: true
    liquibase-schema: public
    database-change-log-table: ural_cargo_log
    database-change-log-lock-table: ural_cargo_lock
    change-log: classpath:db/changelog-master.xml
    default-schema: ural_cargo

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT}
    org:
      springframework: INFO
      hibernate: INFO
      apache:
        tomcat:
          util: WARN
