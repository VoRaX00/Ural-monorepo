server:
  port: ${SERVER_PORT}

spring:
  application:
    name: ural-notifications
    version: @project.version@
  datasource:
    url: ${DB_URL}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        generate_statistics: false
        show_sql: ${SHOW_SQL}
        check_nullability: true
        hbm2ddl:
          auto: validate

  liquibase:
    enabled: true
    liquibase-schema: public
    database-change-log-table: ural_notifications_log
    database-change-log-lock-table: ural_notifications_lock
    change-log: classpath:db/changelog-master.xml
    default-schema: ural_notifications
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

kafka:
  group-id: ${KAFKA_GROUP_ID}
  notification-email-topic:
    name: ${URAL_EMAIL_NOTIFICATIONS_TOPIC_NAME}
    partitions: ${URAL_EMAIL_NOTIFICATIONS_TOPIC_PARTITIONS}
    replicationFactor: ${URAL_EMAIL_NOTIFICATIONS_TOPIC_REPLICATION_FACTOR}
  notification-contract-topic:
    name: ${URAL_CONTRACT_NOTIFICATIONS_TOPIC_NAME}
    partitions: ${URAL_CONTRACT_NOTIFICATIONS_TOPIC_PARTITIONS}
    replicationFactor: ${URAL_CONTRACT_NOTIFICATIONS_TOPIC_REPLICATION_FACTOR}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT}
    org:
      springframework: INFO
      hibernate: INFO
      apache:
        tomcat:
          util: WARN
